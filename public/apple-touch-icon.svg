<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="appleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f7931e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb627;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background with rounded corners for modern iOS look -->
  <rect x="10" y="10" width="160" height="160" rx="35" ry="35" fill="url(#appleGradient)" stroke="#fef7f0" stroke-width="2"/>
  <!-- J letter (corrected direction) -->
  <path d="M95 45 L95 105 Q95 125 75 125 Q55 125 55 105 L55 95" 
        fill="none" 
        stroke="#fef7f0" 
        stroke-width="12" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow)"/>
  <!-- H letter -->
  <path d="M115 45 L115 135 M115 90 L140 90 M140 45 L140 135" 
        fill="none" 
        stroke="#fef7f0" 
        stroke-width="12" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow)"/>
</svg>
