<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="adaptiveGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f7931e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb627;stop-opacity:1" />
    </linearGradient>
  </defs>
  <style>
    @media (prefers-color-scheme: light) {
      .letters { stroke: #fef7f0; }
      .border { stroke: #fef7f0; }
    }
    @media (prefers-color-scheme: dark) {
      .letters { stroke: #2c1810; }
      .border { stroke: #2c1810; }
    }
  </style>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#adaptiveGradient)" class="border" stroke-width="1"/>
  <!-- J letter (corrected direction) -->
  <path d="M18 8 L18 18 Q18 22 14 22 Q10 22 10 18 L10 16" 
        fill="none" 
        class="letters"
        stroke-width="2.5" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  <!-- H letter -->
  <path d="M22 8 L22 24 M22 16 L26 16 M26 8 L26 24" 
        fill="none" 
        class="letters"
        stroke-width="2.5" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  <!-- Adaptive glow effect -->
  <circle cx="16" cy="16" r="15" fill="none" stroke="url(#adaptiveGradient)" stroke-width="0.6" opacity="0.7"/>
</svg>
